<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/public/favicon.svg" />

    <!-- Mobile-optimized viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- App metadata -->
    <title>BasicApp Mobile - Helix Framework</title>
    <meta name="description" content="Mobile app built with Helix Framework - Feature-Based Component Architecture" />

    <!-- Theme and status bar -->
    <meta name="theme-color" content="#8B5CF6">
    <meta name="msapplication-TileColor" content="#8B5CF6">

    <!-- iOS Web App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BasicApp Mobile">

    <!-- Android Chrome Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="BasicApp Mobile">

    <!-- Prevent iOS telephone number detection -->
    <meta name="format-detection" content="telephone=no">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
